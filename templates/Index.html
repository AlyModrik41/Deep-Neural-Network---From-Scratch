<!DOCTYPE html>
<html lang="en">
<head>
<title>🐧 Penguin Neural Network Classifier</title>
<style>
  :root {
    --ice: #d6eeff;
    --deep: #0a1628;
    --mid: #0f2a4a;
    --accent: #4a90d9;
    --glow: #7ec8ff;
    --green: #6cffb0;
    --orange: #ffb06c;
    --glass: rgba(10, 22, 40, 0.72);
    --border: rgba(126, 200, 255, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: sans-serif;
    min-height: 100vh;
    background: url('/static/icebackground.jpg') center center / cover fixed;
    color: #fff;
    overflow-x: hidden;
  }

  /* Frost overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(160deg,
      rgba(10,22,40,0.55) 0%,
      rgba(10,22,40,0.3) 40%,
      rgba(10,22,40,0.6) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Floating ice particles */
  .particle {
    position: fixed;
    border-radius: 50%;
    background: rgb(255, 255, 255);
    animation: float linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes float {
    0%   { transform: translateY(-100px) rotate(0deg); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: 100vh;
    gap: 0;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--glass);
    backdrop-filter: blur(18px);
    border-right: 1px solid var(--border);
    padding: 40px 30px;
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes slideIn {
    from { transform: translateX(-60px); opacity: 0; }
    to   { transform: translateX(0);     opacity: 1; }
  }

  .logo {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo .penguin {
    font-size: 52px;
    display: block;
    
  }

  @keyframes waddle {
    0%, 100% { transform: rotate(-5deg); }
    50%       { transform: rotate(5deg);  }
  }

  .logo h1 {
    font-family:  serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--glow);
    text-transform: uppercase;
    margin-top: 10px;
    line-height: 1.5;
  }

  .logo p {
    font-size: 11px;
    color: rgba(255,255,255);
    letter-spacing: 2px;
    margin-top: 4px;
    text-transform: uppercase;
  }


  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 14px;
    font-weight: 600;
  }

  .field {
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 7px;
    letter-spacing: 1px;
  }

  .field input[type="number"],
  .field input[type="text"],
  .field select {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: #fff;
    font-family: 'Raleway', sans-serif;
    font-size: 14px;
    outline: none;
    transition: all 0.25s;
  }

  .field input:focus,
  .field select:focus {
    border-color: var(--accent);
    background: rgba(74, 144, 217, 0.12);
    box-shadow: 0 0 0 3px rgba(74,144,217,0.15);
  }

  .field select option { background: var(--mid); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
    cursor: pointer;
  }

  .checkbox-row input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .checkbox-row span {
    font-size: 13px;
    color: rgba(255,255,255,0.7);
  }

  .train-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #1a5fa8, #4a90d9);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin-top: 10px;
  }

  .train-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -60%;
    width: 40%; height: 200%;
    background: rgba(255,255,255,0.15);
    transform: skewX(-20deg);
    transition: left 0.5s;
  }

  .train-btn:hover::before { left: 130%; }
  .train-btn:hover {
    box-shadow: 0 0 24px rgba(74,144,217,0.5);
    transform: translateY(-1px);
  }

  .train-btn:active { transform: translateY(0); }

  .train-btn.loading {
    pointer-events: none;
    opacity: 0.7;
  }

  /* ── MAIN CONTENT ── */
  .main {
    padding: 40px 48px;
    display: flex;
    flex-direction: column;
    gap: 28px;
    animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  @keyframes fadeUp {
    from { transform: translateY(30px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .main-title {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    color: #fff;
    text-shadow: 0 0 30px rgba(126,200,255,0.4);
    letter-spacing: 2px;
  }

  .main-title span { color: var(--glow); }

  /* Results */
  .results { display: flex; flex-direction: column; gap: 24px; }

  /* Accuracy cards */
  .acc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .acc-card {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes popIn {
    from { transform: scale(0.85); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .acc-card .label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .acc-card .value {
    font-family: 'Cinzel', serif;
    font-size: 38px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 14px;
  }

  .acc-card.train .value { color: var(--green); }
  .acc-card.test  .value { color: var(--orange); }

  .progress-track {
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 99px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .acc-card.train .progress-fill { background: linear-gradient(90deg, #1a9e6a, #6cffb0); }
  .acc-card.test  .progress-fill { background: linear-gradient(90deg, #c47a1a, #ffb06c); }

  /* Architecture card */
  .arch-card {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
  }

  .arch-card .card-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .arch-viz {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .arch-node {
    background: rgba(74,144,217,0.15);
    border: 1px solid rgba(74,144,217,0.4);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    color: var(--glow);
    font-weight: 600;
    white-space: nowrap;
  }

  .arch-node.input  { border-color: rgba(108,255,176,0.4); color: var(--green); background: rgba(108,255,176,0.08); }
  .arch-node.output { border-color: rgba(255,176,108,0.4); color: var(--orange); background: rgba(255,176,108,0.08); }

  .arch-arrow { color: rgba(255,255,255,0.3); font-size: 18px; }

  /* Confusion matrix */
  .cm-card {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }

  .cm-card .card-title {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .cm-table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 4px;
  }

  .cm-table th {
    font-size: 11px;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.5);
    padding: 6px 10px;
    text-align: center;
    font-weight: 400;
  }

  .cm-table td {
    text-align: center;
    padding: 16px 10px;
    border-radius: 8px;
    font-size: 22px;
    font-weight: 700;
    font-family: serif;
    transition: all 0.3s;
    min-width: 70px;
  }

  .cm-table td.diagonal {
    background: linear-gradient(135deg, rgba(74,144,217,0.4), rgba(126,200,255,0.2));
    border: 1px solid rgba(126,200,255,0.3);
    color: #fff;
    box-shadow: 0 0 16px rgba(74,144,217,0.2);
  }

  .cm-table td.off-diag {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.4);
    font-size: 18px;
  }

  .cm-table td.off-diag:not([data-val="0"]) {
    background: rgba(255,80,80,0.12);
    border-color: rgba(255,80,80,0.2);
    color: #ff8080;
  }

  .cm-axis-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    text-align: center;
    margin-top: 10px;
  }


</style>
</head>
<body>

<!-- Floating particles -->
<script>
  for (let i = 0; i < 1000; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 6 + 2;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}vw;
      animation-duration:${Math.random()*20+15}s;
      animation-delay:${Math.random()*20}s;
    `;
    document.body.appendChild(p);
  }
</script>

<div class="wrapper">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="logo">
      <span class="penguin">🐧</span>
      <h1>Penguin<br>Classifier</h1>
      <p>Neural Network</p>
    </div>

    <div class="section-label">Architecture</div>

    <div class="field">
      <label>Hidden Layers</label>
      <input type="number" id="n_layers" value="1" min="1" max="10"/>
    </div>
    <div class="field">
      <label>Neurons per Layer (comma separated)</label>
      <input type="text" id="neurons" value="6"/>
    </div>

    <div class="section-label">Training</div>

    <div class="field">
      <label>Learning Rate (η)</label>
      <input type="number" id="eta" value="0.01" step="0.001" min="0.000001"/>
    </div>
    <div class="field">
      <label>Epochs</label>
      <input type="number" id="epochs" value="1000" min="1"/>
    </div>
    <div class="field">
      <label>Activation Function</label>
      <select id="activation">
        <option value="sigmoid">Sigmoid</option>
        <option value="tanh">Tanh</option>
      </select>
    </div>

    <label class="checkbox-row">
      <input type="checkbox" id="bias" checked/>
      <span>Add Bias</span>
    </label>

    <button class="train-btn" id="trainBtn" onclick="trainNetwork()">
      TRAIN NETWORK
    </button>
  </aside>

  <!-- ── MAIN ── -->
  <main class="main">
    <div>
      <h2 class="main-title">Antarctic <span>Penguin</span> Species Classifier</h2>
    </div>

    <div id="results" class="results">

      <!-- Accuracy -->
      <div class="acc-grid">
        <div class="acc-card train">
          <div class="label">🎯 Train Accuracy</div>
          <div class="value" id="trainAcc">0%</div>
          <div class="progress-track">
            <div class="progress-fill" id="trainBar"></div>
          </div>
        </div>
        <div class="acc-card test">
          <div class="label">🧪 Test Accuracy</div>
          <div class="value" id="testAcc">0%</div>
          <div class="progress-track">
            <div class="progress-fill" id="testBar"></div>
          </div>
        </div>
      </div>

      <!-- Architecture -->
      <div class="arch-card">
        <div class="card-title">🧠 Network Architecture</div>
        <div class="arch-viz" id="archViz"></div>
      </div>

      <!-- Confusion Matrix -->
      <div class="cm-card">
        <div class="card-title">📊 Confusion Matrix</div>
        <div id="cmContainer"></div>
      </div>

    </div>
  </main>
</div>

<script>
async function trainNetwork() {
  const btn = document.getElementById('trainBtn');
  btn.classList.add('loading');
  btn.innerHTML = 'TRAINING...';

  const payload = {
    neurons    : document.getElementById('neurons').value,
    eta        : parseFloat(document.getElementById('eta').value),
    epochs     : parseInt(document.getElementById('epochs').value),
    bias       : document.getElementById('bias').checked,
    activation : document.getElementById('activation').value
  };

  try {
    const res  = await fetch('/train', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    });
    const data = await res.json();
    showResults(data);
  } catch(e) {
    alert('Error: ' + e.message);
  }

  btn.classList.remove('loading');
  btn.innerHTML = 'TRAIN NETWORK';
}

function showResults(data) {
  const results = document.getElementById('results');
  results.style.display = 'flex';

  // accuracy
  document.getElementById('trainAcc').textContent = data.train_acc + '%';
  document.getElementById('testAcc').textContent  = data.test_acc  + '%';
  setTimeout(() => {
    document.getElementById('trainBar').style.width = data.train_acc + '%';
    document.getElementById('testBar').style.width  = data.test_acc  + '%';
  }, 100);

  // architecture
  const viz     = document.getElementById('archViz');
  viz.innerHTML = '';
  const nodes   = ['Input (5)', ...data.neurons.map((n,i) => `Hidden ${i+1} (${n})`), 'Output (3)'];
  nodes.forEach((n, i) => {
    const cls = i === 0 ? 'input' : i === nodes.length-1 ? 'output' : '';
    viz.innerHTML += `<div class="arch-node ${cls}">${n}</div>`;
    if (i < nodes.length - 1) viz.innerHTML += `<div class="arch-arrow">→</div>`;
  });

  // confusion matrix
  const cm     = data.cm;
  const names  = data.class_names;
  let html     = '<table class="cm-table">';
  html += '<tr><th></th>' + names.map(n => `<th>${n}</th>`).join('') + '</tr>';
  cm.forEach((row, i) => {
    html += `<tr><th>${names[i]}</th>`;
    row.forEach((val, j) => {
      const cls = i === j ? 'diagonal' : 'off-diag';
      html += `<td class="${cls}" data-val="${val}">${val}</td>`;
    });
    html += '</tr>';
  });
  html += '</table>';
  document.getElementById('cmContainer').innerHTML = html;
}
</script>
</body>
</html>
